<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        .current-player {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-status {
            color: #4a5568;
            font-weight: 500;
            min-height: 25px;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 5px;
            max-width: 300px;
            margin: 0 auto 25px;
            background: #4a5568;
            border-radius: 10px;
            padding: 5px;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell:hover {
            background: #f7fafc;
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .cell:disabled {
            cursor: not-allowed;
        }

        .cell.x {
            color: #e53e3e;
        }

        .cell.o {
            color: #3182ce;
        }

        .winning-cell {
            background: #48bb78 !important;
            color: white !important;
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .reset-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .winner-announcement {
            color: #48bb78;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .draw-announcement {
            color: #ed8936;
            font-weight: bold;
            font-size: 1.3rem;
        }

        @media (max-width: 480px) {
            .game-container {
                margin: 20px;
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .cell {
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }
            
            .game-board {
                max-width: 240px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>井字棋游戏</h1>
        
        <div class="game-info">
            <div class="current-player" id="currentPlayer">当前玩家: X</div>
            <div class="game-status" id="gameStatus">游戏进行中...</div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <!-- 游戏格子将由JavaScript动态生成 -->
        </div>
        
        <button class="reset-btn" id="resetBtn" onclick="resetGame()">重新开始</button>
    </div>

    <script>
        // 游戏状态管理
        class TicTacToeGame {
            constructor() {
                this.board = Array(9).fill(''); // 9个格子的棋盘
                this.currentPlayer = 'X'; // 当前玩家
                this.gameActive = true; // 游戏是否进行中
                this.winningCombinations = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], // 横向
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], // 纵向
                    [0, 4, 8], [2, 4, 6] // 对角线
                ];
                this.init();
            }

            // 初始化游戏
            init() {
                this.createBoard();
                this.updateDisplay();
            }

            // 创建游戏棋盘
            createBoard() {
                const gameBoard = document.getElementById('gameBoard');
                gameBoard.innerHTML = '';
                
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('button');
                    cell.className = 'cell';
                    cell.setAttribute('data-index', i);
                    cell.addEventListener('click', () => this.handleCellClick(i));
                    gameBoard.appendChild(cell);
                }
            }

            // 处理格子点击事件
            handleCellClick(index) {
                // 检查游戏是否结束或格子是否已被占用
                if (!this.gameActive || this.board[index] !== '') {
                    return;
                }

                try {
                    // 在棋盘上放置棋子
                    this.board[index] = this.currentPlayer;
                    
                    // 更新UI
                    const cell = document.querySelector(`[data-index="${index}"]`);
                    cell.textContent = this.currentPlayer;
                    cell.classList.add(this.currentPlayer.toLowerCase());
                    cell.disabled = true;

                    // 检查游戏结果
                    if (this.checkWinner()) {
                        this.handleGameEnd('win');
                    } else if (this.checkDraw()) {
                        this.handleGameEnd('draw');
                    } else {
                        // 切换玩家
                        this.switchPlayer();
                        this.updateDisplay();
                    }
                } catch (error) {
                    console.error('处理点击事件时发生错误:', error);
                }
            }

            // 检查是否有玩家获胜
            checkWinner() {
                for (let combination of this.winningCombinations) {
                    const [a, b, c] = combination;
                    if (this.board[a] && 
                        this.board[a] === this.board[b] && 
                        this.board[a] === this.board[c]) {
                        this.highlightWinningCells(combination);
                        return true;
                    }
                }
                return false;
            }

            // 高亮获胜的格子
            highlightWinningCells(combination) {
                combination.forEach(index => {
                    const cell = document.querySelector(`[data-index="${index}"]`);
                    cell.classList.add('winning-cell');
                });
            }

            // 检查是否平局
            checkDraw() {
                return this.board.every(cell => cell !== '');
            }

            // 处理游戏结束
            handleGameEnd(result) {
                this.gameActive = false;
                const statusElement = document.getElementById('gameStatus');
                
                if (result === 'win') {
                    statusElement.textContent = `🎉 玩家 ${this.currentPlayer} 获胜！`;
                    statusElement.className = 'game-status winner-announcement';
                } else if (result === 'draw') {
                    statusElement.textContent = '🤝 平局！';
                    statusElement.className = 'game-status draw-announcement';
                }

                // 禁用所有格子
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.disabled = true;
                });
            }

            // 切换当前玩家
            switchPlayer() {
                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
            }

            // 更新显示信息
            updateDisplay() {
                const currentPlayerElement = document.getElementById('currentPlayer');
                currentPlayerElement.textContent = `当前玩家: ${this.currentPlayer}`;
            }

            // 重置游戏
            reset() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                
                // 重置UI
                document.getElementById('gameStatus').textContent = '游戏进行中...';
                document.getElementById('gameStatus').className = 'game-status';
                
                // 重新创建棋盘
                this.createBoard();
                this.updateDisplay();
            }
        }

        // 全局游戏实例
        let game;

        // 重置游戏函数
        function resetGame() {
            if (game) {
                game.reset();
            }
        }

        // 页面加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', function() {
            try {
                game = new TicTacToeGame();
            } catch (error) {
                console.error('初始化游戏时发生错误:', error);
                alert('游戏初始化失败，请刷新页面重试。');
            }
        });

        // 错误处理
        window.addEventListener('error', function(e) {
            console.error('页面发生错误:', e.error);
        });
    </script>
</body>
</html>
